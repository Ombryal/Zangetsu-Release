name: Zangetsu Event Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write      # for force-pushing the state file

concurrency:
  group: zangetsu-event-watcher
  cancel-in-progress: true

env:
  OWNER: Spyou
  REPO: Zangetsu
  STATE_FILE: .state/last_event_id.txt

jobs:
  watch-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read last processed event ID
        id: last_event
        run: |
          set -euo pipefail
          if [ -f "$STATE_FILE" ]; then
            LAST_ID="$(tr -d '\r\n' < "$STATE_FILE")"
            if [ -z "$LAST_ID" ]; then
              LAST_ID="0"
            fi
          else
            LAST_ID="0"
          fi
          echo "id=$LAST_ID" >> "$GITHUB_OUTPUT"

      - name: Fetch all new repository events (paginated)
        env:
          GH_TOKEN: ${{ github.token }}
          LAST_ID: ${{ steps.last_event.outputs.id }}
        run: |
          set -euo pipefail
          LAST_ID="$LAST_ID"
          PAGE=1
          STOP=0
          echo "[]" > new_events.json

          while [ $STOP -eq 0 ]; do
            echo "Fetching page $PAGE..."
            set +e
            gh api "repos/$OWNER/$REPO/events?per_page=100&page=$PAGE" > page.json
            GH_EXIT=$?
            set -e
            if [ $GH_EXIT -ne 0 ]; then
              echo "GitHub API error. Stopping."
              break
            fi
            EVENTS_COUNT="$(jq '. | length' page.json)"
            if [ "$EVENTS_COUNT" -eq 0 ]; then
              echo "No more events."
              break
            fi
            jq -s '.[0] + .[1]' new_events.json page.json > merged.json
            mv merged.json new_events.json
            MIN_ID="$(jq -r '[.[].id | tonumber] | min' page.json)"
            if [ "$MIN_ID" -le "$LAST_ID" ]; then
              echo "Reached already processed events."
              STOP=1
            fi
            PAGE=$((PAGE + 1))
            if [ $PAGE -gt 10 ]; then
              echo "Max pages reached."
              STOP=1
            fi
          done

      - name: Process new events and send to Discord
        env:
          WEBHOOK_1: ${{ secrets.DISCORD_EVENTS_WEBHOOK_URL_1 }}
          WEBHOOK_2: ${{ secrets.DISCORD_EVENTS_WEBHOOK_URL_2 }}
          LAST_ID: ${{ steps.last_event.outputs.id }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, subprocess, sys, time

          with open("new_events.json", "r", encoding="utf-8") as f:
              events = json.load(f)

          EVENT_TYPES = {"PushEvent", "ForkEvent", "WatchEvent", "IssuesEvent", "IssueCommentEvent", "PullRequestEvent"}
          last_id = int(os.environ["LAST_ID"])
          latest_sent_id = last_id

          webhooks = []
          for key in ("WEBHOOK_1", "WEBHOOK_2"):
              url = os.environ.get(key, "").strip()
              if url:
                  webhooks.append(url)
          if not webhooks:
              print("No webhook URLs configured. Exiting.")
              sys.exit(0)

          # Helper to write the latest sent ID to a file (for later Git commit)
          def save_progress(new_id):
              with open("latest_sent_id.txt", "w") as f:
                  f.write(str(new_id))
              print(f"Saved progress: {new_id}")

          sorted_events = sorted(events, key=lambda e: int(e["id"]))
          embeds_to_send = []

          for event in sorted_events:
              event_id = int(event["id"])
              if event_id <= last_id:
                  continue
              if event["type"] not in EVENT_TYPES:
                  continue
              actor = event["actor"]
              avatar_url = actor["avatar_url"] + "&s=80"
              actor_name = actor["display_login"]
              payload = event.get("payload", {})
              repo_name = event["repo"]["name"]
              repo_url = f"https://github.com/{repo_name}"

              if event["type"] == "PushEvent":
                  ref = payload.get("ref", "").replace("refs/heads/", "")
                  commits = payload.get("commits", [])
                  if not commits: continue
                  branch_url = f"{repo_url}/tree/{ref}"
                  commit_lines = []
                  for c in commits:
                      fsha = c["sha"]
                      commit_lines.append(f"[`{fsha[:7]}`]({repo_url}/commit/{fsha}) {c['message'].split(chr(10))[0]} — **{c['author']['name']}**")
                  title = f"[{repo_name}:{ref}] {len(commits)} new commit{'s' if len(commits)>1 else ''}"
                  embed = {"author":{"name":actor_name,"icon_url":avatar_url},"title":title,"url":branch_url,"description":"\n".join(commit_lines),"color":0x57A9FF,"footer":{"text":repo_name},"timestamp":event["created_at"]}
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "ForkEvent":
                  forkee = payload["forkee"]["full_name"]
                  embed = {"author":{"name":actor_name,"icon_url":avatar_url},"title":f"[{repo_name}] Fork created: {forkee}","url":f"https://github.com/{forkee}","color":0xFFAC33,"footer":{"text":repo_name},"timestamp":event["created_at"]}
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "WatchEvent":
                  embed = {"author":{"name":actor_name,"icon_url":avatar_url},"title":f"[{repo_name}] New star added","url":repo_url,"color":0xFFD700,"footer":{"text":repo_name},"timestamp":event["created_at"]}
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "IssuesEvent":
                  issue = payload["issue"]
                  action = payload["action"]
                  body = (issue.get("body") or "")[:500]
                  color = 0xED4245 if action in ("opened","reopened") else 0x57F287
                  embed = {"author":{"name":actor_name,"icon_url":avatar_url},"title":f"[{repo_name}] Issue {action}: #{issue['number']} {issue['title']}","url":issue["html_url"],"description":body,"color":color,"footer":{"text":repo_name},"timestamp":event["created_at"]}
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "IssueCommentEvent":
                  issue = payload["issue"]
                  comment = payload["comment"]
                  body = comment["body"][:500]
                  embed = {"author":{"name":actor_name,"icon_url":avatar_url},"title":f"[{repo_name}] New comment on issue #{issue['number']}: {issue['title']}","url":comment["html_url"],"description":body,"color":0x5865F2,"footer":{"text":repo_name},"timestamp":event["created_at"]}
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "PullRequestEvent":
                  pr = payload["pull_request"]
                  action = payload["action"]
                  body = (pr.get("body") or "")[:500]
                  color = 0x5865F2 if action in ("opened","reopened") else 0x57F287
                  embed = {"author":{"name":actor_name,"icon_url":avatar_url},"title":f"[{repo_name}] Pull Request {action}: #{pr['number']} {pr['title']}","url":pr["html_url"],"description":body,"color":color,"footer":{"text":repo_name},"timestamp":event["created_at"]}
                  embeds_to_send.append((embed, event_id))

          sent_count = 0
          for i, (embed, event_id) in enumerate(embeds_to_send):
              webhook_url = webhooks[i % len(webhooks)]
              payload_json = {"allowed_mentions":{"parse":[]},"embeds":[embed]}
              success = False
              for attempt in range(3):
                  res = subprocess.run(["curl","-sS","-o","/dev/null","-w","%{http_code}","-H","Content-Type: application/json","-X","POST","--data",json.dumps(payload_json),webhook_url], capture_output=True, text=True)
                  if res.returncode==0 and res.stdout.startswith("2"):
                      sent_count+=1; success=True; break
                  else:
                      print(f"HTTP {res.stdout.strip()} attempt {attempt+1}")
                      time.sleep(5)
              if not success:
                  print(f"Failed to send embed for event {event_id}. Stopping.")
                  break

              # Save progress immediately after each successful send
              latest_sent_id = event_id
              save_progress(latest_sent_id)

              if i < len(embeds_to_send)-1:
                  print("Waiting 4 minutes...")
                  time.sleep(240)

          # Write the final latest ID again (in case loop finished)
          save_progress(latest_sent_id)
          print(f"Sent {sent_count} message(s).")
          PY

      - name: Save latest event ID to repository
        run: |
          set -euo pipefail

          # If no progress file exists, skip (no events were sent)
          if [ ! -f latest_sent_id.txt ]; then
            echo "No events processed, nothing to save."
            exit 0
          fi

          mkdir -p .state
          cp latest_sent_id.txt "$STATE_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add to bypass any .gitignore
          git add -f "$STATE_FILE"

          if git diff --cached --quiet; then
            echo "State file unchanged, nothing to commit."
            exit 0
          fi

          git commit -m "Update last event ID"

          # Push with retry
          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git push origin HEAD; then
              echo "Push successful."
              exit 0
            fi
            sleep 5
          done

          echo "::error::Push failed after 3 attempts."
          exit 1
