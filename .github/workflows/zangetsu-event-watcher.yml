name: Zangetsu Event Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read   # we only need to read the variable, not push

concurrency:
  group: zangetsu-event-watcher
  cancel-in-progress: true   # still cancel if a new run starts, but with variable updates the next run will resume correctly

env:
  OWNER: Spyou
  REPO: Zangetsu

jobs:
  watch-events:
    runs-on: ubuntu-latest

    steps:
      - name: Read last processed event ID (from repository variable)
        id: last_event
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if LAST_ID="$(gh api "repos/${{ github.repository }}/actions/variables/LAST_ZANGETSU_EVENT_ID" --jq '.value' 2>/dev/null)"; then
            echo "Last processed event ID: $LAST_ID"
            echo "id=$LAST_ID" >> "$GITHUB_OUTPUT"
          else
            echo "Variable not found, starting from 0."
            echo "id=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch all new repository events (paginated)
        env:
          GH_TOKEN: ${{ github.token }}
          LAST_ID: ${{ steps.last_event.outputs.id }}
        run: |
          set -euo pipefail

          LAST_ID="$LAST_ID"
          PAGE=1
          STOP=0
          echo "[]" > new_events.json

          while [ $STOP -eq 0 ]; do
            echo "Fetching page $PAGE..."

            set +e
            gh api "repos/$OWNER/$REPO/events?per_page=100&page=$PAGE" > page.json
            GH_EXIT=$?
            set -e

            if [ $GH_EXIT -ne 0 ]; then
              echo "GitHub API returned an error (probably hit pagination limit). Stopping."
              break
            fi

            EVENTS_COUNT="$(jq '. | length' page.json)"
            if [ "$EVENTS_COUNT" -eq 0 ]; then
              echo "No more events. Stopping."
              break
            fi

            jq -s '.[0] + .[1]' new_events.json page.json > merged.json
            mv merged.json new_events.json

            MIN_ID="$(jq -r '[.[].id | tonumber] | min' page.json)"

            if [ "$MIN_ID" -le "$LAST_ID" ]; then
              echo "Reached events older than last processed ID ($LAST_ID). Stopping."
              STOP=1
            fi

            PAGE=$((PAGE + 1))
            if [ $PAGE -gt 10 ]; then
              echo "Reached maximum pages (10). Stopping."
              STOP=1
            fi
          done

      - name: Process new events and send to Discord (resumable, variable-updated)
        env:
          WEBHOOK_1: ${{ secrets.DISCORD_EVENTS_WEBHOOK_URL_1 }}
          WEBHOOK_2: ${{ secrets.DISCORD_EVENTS_WEBHOOK_URL_2 }}
          LAST_ID: ${{ steps.last_event.outputs.id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, os, subprocess, sys, time

          with open("new_events.json", "r", encoding="utf-8") as f:
              events = json.load(f)

          EVENT_TYPES = {"PushEvent", "ForkEvent", "WatchEvent", "IssuesEvent", "IssueCommentEvent", "PullRequestEvent"}

          last_id = int(os.environ["LAST_ID"])
          latest_sent_id = last_id   # will be updated after each successful send

          webhooks = []
          for key in ("WEBHOOK_1", "WEBHOOK_2"):
              url = os.environ.get(key, "").strip()
              if url:
                  webhooks.append(url)

          if not webhooks:
              print("No webhook URLs configured. Exiting.")
              sys.exit(0)

          # Helper to update the repository variable
          def update_variable(new_id):
              repo = os.environ["GITHUB_REPOSITORY"]
              # Use gh api to PATCH the variable
              subprocess.run(
                  ["gh", "api", "--method", "PATCH",
                   f"repos/{repo}/actions/variables/LAST_ZANGETSU_EVENT_ID",
                   "-f", "name=LAST_ZANGETSU_EVENT_ID",
                   "-f", f"value={new_id}"],
                  check=True,
                  capture_output=True
              )
              print(f"Updated variable to {new_id}")

          sorted_events = sorted(events, key=lambda e: int(e["id"]))
          embeds_to_send = []

          # Build list of (embed, event_id) for all new events
          for event in sorted_events:
              event_id = int(event["id"])
              if event_id <= last_id:
                  continue
              if event["type"] not in EVENT_TYPES:
                  continue

              actor = event["actor"]
              avatar_url = actor["avatar_url"] + "&s=80"
              actor_name = actor["display_login"]
              payload = event.get("payload", {})
              repo_name = event["repo"]["name"]

              if event["type"] == "PushEvent":
                  ref = payload.get("ref", "").replace("refs/heads/", "")
                  commits = payload.get("commits", [])
                  if not commits:
                      continue

                  commit_lines = []
                  for c in commits:
                      sha = c["sha"][:7]
                      msg = c["message"].split("\n")[0]
                      author = c["author"]["name"]
                      commit_lines.append(f"`{sha}` {msg} — **{author}**")

                  commit_count = len(commits)
                  title = f"📦 [{ref}] {commit_count} new commit{'s' if commit_count > 1 else ''}"

                  embed = {
                      "author": {
                          "name": actor_name,
                          "icon_url": avatar_url
                      },
                      "title": title,
                      "description": "\n".join(commit_lines),
                      "color": 0x57A9FF,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "ForkEvent":
                  forkee = payload["forkee"]["full_name"]
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": "🍴 New Fork",
                      "description": f"**{forkee}**",
                      "color": 0xFFAC33,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "WatchEvent":
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": "⭐ New Star",
                      "description": f"{actor_name} starred the repository",
                      "color": 0xFFD700,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "IssuesEvent":
                  issue = payload["issue"]
                  action = payload["action"]
                  title = issue["title"]
                  number = issue["number"]
                  url = issue["html_url"]
                  color = 0xED4245 if action in ["opened", "reopened"] else 0x57F287
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": f"Issue {action}: {title} (#{number})",
                      "url": url,
                      "color": color,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "IssueCommentEvent":
                  issue = payload["issue"]
                  comment = payload["comment"]
                  issue_title = issue["title"]
                  issue_number = issue["number"]
                  comment_body = comment["body"]
                  if len(comment_body) > 500:
                      comment_body = comment_body[:497] + "..."
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": f"💬 Comment on #{issue_number}: {issue_title}",
                      "description": comment_body,
                      "url": comment["html_url"],
                      "color": 0x5865F2,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "PullRequestEvent":
                  pr = payload["pull_request"]
                  action = payload["action"]
                  title = pr["title"]
                  number = pr["number"]
                  url = pr["html_url"]
                  color = 0x5865F2 if action == "opened" else 0x57F287
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": f"Pull Request {action}: {title} (#{number})",
                      "url": url,
                      "color": color,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

          sent_count = 0
          for i, (embed, event_id) in enumerate(embeds_to_send):
              webhook_url = webhooks[i % len(webhooks)]

              payload_json = {
                  "allowed_mentions": {"parse": []},
                  "embeds": [embed]
              }

              success = False
              for attempt in range(3):
                  result = subprocess.run(
                      ["curl", "-sS", "-o", "/dev/null", "-w", "%{http_code}",
                       "-H", "Content-Type: application/json",
                       "-X", "POST", "--data", json.dumps(payload_json), webhook_url],
                      capture_output=True, text=True
                  )
                  if result.returncode == 0 and result.stdout.startswith("2"):
                      sent_count += 1
                      success = True
                      break
                  else:
                      http_code = result.stdout.strip()
                      print(f"Webhook {webhook_url[-20:]} HTTP {http_code} on attempt {attempt+1}")
                      time.sleep(5)

              if not success:
                  print(f"Failed to send embed for event {event_id}. Stopping sending.", file=sys.stderr)
                  # Still save the last successfully sent ID (latest_sent_id) so next run continues from there
                  break

              # Successfully sent – update the variable right away so we can resume
              latest_sent_id = event_id
              update_variable(latest_sent_id)

              # Wait 4 minutes before next message (unless it's the last one)
              if i < len(embeds_to_send) - 1:
                  print("Waiting 4 minutes before next message...")
                  time.sleep(240)

          print(f"Sent {sent_count} message(s) for new events.")
          PY
