name: Zangetsu Event Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: zangetsu-event-watcher
  cancel-in-progress: true

env:
  OWNER: Spyou
  REPO: Zangetsu
  STATE_FILE: .state/last_event_id.txt

jobs:
  watch-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read last processed event ID
        id: last_event
        run: |
          set -euo pipefail
          if [ -f "$STATE_FILE" ]; then
            LAST_ID="$(tr -d '\r\n' < "$STATE_FILE")"
            if [ -z "$LAST_ID" ]; then
              LAST_ID="0"
            fi
          else
            LAST_ID="0"
          fi
          echo "id=$LAST_ID" >> "$GITHUB_OUTPUT"

      - name: Fetch all new repository events (paginated)
        env:
          GH_TOKEN: ${{ github.token }}
          LAST_ID: ${{ steps.last_event.outputs.id }}
        run: |
          set -euo pipefail

          LAST_ID="$LAST_ID"
          PAGE=1
          STOP=0
          echo "[]" > new_events.json

          while [ $STOP -eq 0 ]; do
            echo "Fetching page $PAGE..."

            # Temporarily disable exit-on-error to handle API errors gracefully
            set +e
            gh api "repos/$OWNER/$REPO/events?per_page=100&page=$PAGE" > page.json
            GH_EXIT=$?
            set -e

            if [ $GH_EXIT -ne 0 ]; then
              echo "GitHub API returned an error (probably hit pagination limit). Stopping fetching."
              break
            fi

            EVENTS_COUNT="$(jq '. | length' page.json)"
            if [ "$EVENTS_COUNT" -eq 0 ]; then
              echo "No more events. Stopping."
              break
            fi

            # Concatenate events into new_events.json
            jq -s '.[0] + .[1]' new_events.json page.json > merged.json
            mv merged.json new_events.json

            # Get the smallest event ID on this page (as a raw number)
            MIN_ID="$(jq -r '[.[].id | tonumber] | min' page.json)"

            # If any event on this page has an ID <= LAST_ID, we've reached already processed events
            if [ "$MIN_ID" -le "$LAST_ID" ]; then
              echo "Reached events older than last processed ID ($LAST_ID). Stopping."
              STOP=1
            fi

            PAGE=$((PAGE + 1))
            # Safety: stop after 10 pages to avoid infinite loop
            if [ $PAGE -gt 10 ]; then
              echo "Reached maximum pages (10). Stopping."
              STOP=1
            fi
          done

      - name: Process new events and send to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_EVENTS_WEBHOOK_URL }}
          LAST_ID: ${{ steps.last_event.outputs.id }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, os, subprocess, sys, time

          with open("new_events.json", "r", encoding="utf-8") as f:
              events = json.load(f)

          EVENT_TYPES = {"PushEvent", "ForkEvent", "WatchEvent", "IssuesEvent", "IssueCommentEvent", "PullRequestEvent"}

          last_id = int(os.environ["LAST_ID"])
          new_last_id = last_id

          sorted_events = sorted(events, key=lambda e: int(e["id"]))
          embeds_to_send = []

          for event in sorted_events:
              event_id = int(event["id"])
              if event_id <= last_id:
                  continue
              if event["type"] not in EVENT_TYPES:
                  continue

              new_last_id = max(new_last_id, event_id)
              actor = event["actor"]
              avatar_url = actor["avatar_url"] + "&s=80"
              actor_name = actor["display_login"]
              payload = event.get("payload", {})
              repo_name = event["repo"]["name"]

              if event["type"] == "PushEvent":
                  ref = payload.get("ref", "").replace("refs/heads/", "")
                  commits = payload.get("commits", [])
                  if not commits:
                      continue

                  commit_lines = []
                  for c in commits:
                      sha = c["sha"][:7]
                      msg = c["message"].split("\n")[0]
                      author = c["author"]["name"]
                      commit_lines.append(f"`{sha}` {msg} — **{author}**")

                  commit_count = len(commits)
                  title = f"📦 [{ref}] {commit_count} new commit{'s' if commit_count > 1 else ''}"

                  embed = {
                      "author": {
                          "name": actor_name,
                          "icon_url": avatar_url
                      },
                      "title": title,
                      "description": "\n".join(commit_lines),
                      "color": 0x57A9FF,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "ForkEvent":
                  forkee = payload["forkee"]["full_name"]
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": "🍴 New Fork",
                      "description": f"**{forkee}**",
                      "color": 0xFFAC33,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "WatchEvent":
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": "⭐ New Star",
                      "description": f"{actor_name} starred the repository",
                      "color": 0xFFD700,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "IssuesEvent":
                  issue = payload["issue"]
                  action = payload["action"]
                  title = issue["title"]
                  number = issue["number"]
                  url = issue["html_url"]
                  color = 0xED4245 if action in ["opened", "reopened"] else 0x57F287
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": f"Issue {action}: {title} (#{number})",
                      "url": url,
                      "color": color,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "IssueCommentEvent":
                  issue = payload["issue"]
                  comment = payload["comment"]
                  issue_title = issue["title"]
                  issue_number = issue["number"]
                  comment_body = comment["body"]
                  if len(comment_body) > 500:
                      comment_body = comment_body[:497] + "..."
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": f"💬 Comment on #{issue_number}: {issue_title}",
                      "description": comment_body,
                      "url": comment["html_url"],
                      "color": 0x5865F2,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

              elif event["type"] == "PullRequestEvent":
                  pr = payload["pull_request"]
                  action = payload["action"]
                  title = pr["title"]
                  number = pr["number"]
                  url = pr["html_url"]
                  color = 0x5865F2 if action == "opened" else 0x57F287
                  embed = {
                      "author": {"name": actor_name, "icon_url": avatar_url},
                      "title": f"Pull Request {action}: {title} (#{number})",
                      "url": url,
                      "color": color,
                      "footer": {"text": repo_name},
                      "timestamp": event["created_at"]
                  }
                  embeds_to_send.append((embed, event_id))

          sent_count = 0
          for embed, _ in embeds_to_send:
              payload_json = {
                  "allowed_mentions": {"parse": []},
                  "embeds": [embed]
              }
              attempt = 0
              while attempt < 3:
                  result = subprocess.run(
                      ["curl", "-sS", "-o", "/dev/null", "-w", "%{http_code}",
                       "-H", "Content-Type: application/json",
                       "-X", "POST", "--data", json.dumps(payload_json), os.environ["WEBHOOK"]],
                      capture_output=True, text=True
                  )
                  if result.returncode == 0 and result.stdout.startswith("2"):
                      sent_count += 1
                      break
                  else:
                      attempt += 1
                      if attempt < 3:
                          print(f"Retrying embed (HTTP {result.stdout.strip()})...")
                          time.sleep(2)
                      else:
                          print(f"Failed to send embed after 3 attempts: HTTP {result.stdout.strip()}", file=sys.stderr)
                          sys.exit(1)

              if embed != embeds_to_send[-1][0]:
                  time.sleep(2)

          print(f"Sent {sent_count} message(s) for new events.")

          with open("new_last_id.txt", "w") as f:
              f.write(str(new_last_id))
          PY

      - name: Save latest event ID
        run: |
          set -euo pipefail

          mkdir -p .state
          cp new_last_id.txt "$STATE_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add to bypass .gitignore
          git add -f "$STATE_FILE"

          # Only commit if there's something to commit
          if git diff --cached --quiet; then
            echo "State file unchanged, nothing to commit."
            exit 0
          fi

          git commit -m "Update last event ID"

          # Push with retry
          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git push origin HEAD; then
              echo "Push successful."
              exit 0
            fi
            sleep 5
          done

          echo "::error::Push failed after 3 attempts."
          exit 1
